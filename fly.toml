app = "jeetmoney"
primary_region = "fra"  # Frankfurt — change to nearest: ams, lhr, cdg, sin, nrt, syd, iad, ord

[build]

[env]
  DATABASE_PATH = "/data/finance.db"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[mounts]]
  source = "jeetmoney_data"
  destination = "/data"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
