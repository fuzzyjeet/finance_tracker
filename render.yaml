services:
  - type: web
    name: jeetmoney
    runtime: python
    buildCommand: "npm install && npm run build && pip install -r backend/requirements.txt"
    startCommand: "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_PATH
        value: /var/data/finance.db
    disk:
      name: jeetmoney-data
      mountPath: /var/data
      sizeGB: 1
